[pytest]
pythonpath = .
testpaths = backend/tests
norecursedirs = scripts tools docs engine-go .git .venv __pycache__ htmlcov .pytest_cache
markers =
	perf: performance and scalability tests (skipped by default)
	integration: integration tests requiring Go services and PostgreSQL (skipped in fast mode)
	timeout: per-test wall-clock timeout (requires pytest-timeout plugin)
# Default: Run only fast unit tests (skip integration and perf tests)
# Use --ignore=backend/tests/perf to prevent perf/conftest.py hook from activating PostgreSQL
addopts = -m "not perf and not integration" --ignore=backend/tests/perf
