repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0 # keep aligned with ruff in requirements/pyproject
    hooks:
      - id: ruff
        args: ['--fix']
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
  - repo: local
    hooks:
      - id: backend-max-module-lines
        name: backend max 400 module lines
        entry: python scripts/check_max_module_lines.py
        language: system
        pass_filenames: false
        types: [python]
