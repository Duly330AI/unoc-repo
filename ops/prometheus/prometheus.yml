global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'unoc-backend'
    metrics_path: /api/metrics/prometheus
    static_configs:
      - targets: ['host.docker.internal:5001']
        labels:
          env: 'dev'
          service: 'backend'

  - job_name: 'traffic-engine'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          env: 'dev'
          service: 'traffic'

  - job_name: 'optical-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:50051']
        labels:
          env: 'dev'
          service: 'optical'

  - job_name: 'batch-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:50052']
        labels:
          env: 'dev'
          service: 'batch'

  - job_name: 'status-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:50053']
        labels:
          env: 'dev'
          service: 'status'
